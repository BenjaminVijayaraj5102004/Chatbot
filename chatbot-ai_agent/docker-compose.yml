version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: chatbot_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatbot_db
    ports:
      - "5432:5432"
    volumes:
      - chatbot_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: chatbot_backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  chatbot_pgdata:
